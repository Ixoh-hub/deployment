name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax checks
        run: |
          python -m compileall app.py streamlit_app.py train_save_model.py

      - name: API import smoke test
        run: |
          python -c "import app; print('API import OK')"

      - name: Streamlit import smoke test
        run: |
          python -c "import streamlit_app; print('Streamlit import OK')"
