name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall app.py streamlit_app.py train_save_model.py
      - run: python -c "import app; print('api ok')"
      - run: python -c "import streamlit_app; print('streamlit ok')"
